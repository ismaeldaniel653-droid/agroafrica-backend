services:
  - type: web
    name: agroafrica-ai
    runtime: docker
    rootDir: agroafrica-ai-service
    dockerfilePath: ./Dockerfile
    dockerContext: ./agroafrica-ai-service
    plan: starter
    region: frankfurt
    envVars:
      - key: API_KEY
        sync: false                          # valeur définie dans le dashboard Render
      - key: ALLOWED_ORIGINS
        value: https://agroafrica-frontend.vercel.app
      - key: USE_ML_MODEL
        value: "false"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
    autoDeploy: true
